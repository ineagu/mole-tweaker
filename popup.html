<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 320px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 14px;
    }
    
    .header {
      text-align: center;
      margin-bottom: 16px;
    }
    
    .toggle-container {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
      padding: 8px;
      background: #f5f5f5;
      border-radius: 4px;
    }
    
    .control-group {
      margin-bottom: 12px;
    }
    
    label {
      display: block;
      margin-bottom: 4px;
      font-weight: 500;
    }
    
    select, input {
      width: 100%;
      padding: 6px 8px;
      border: 1px solid #ddd;
      border-radius: 4px;
      box-sizing: border-box;
    }
    
    .button-group {
      display: flex;
      gap: 8px;
      margin-top: 16px;
    }
    
    button {
      flex: 1;
      padding: 8px 16px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
    }
    
    .apply-btn {
      background: #007bff;
      color: white;
    }
    
    .apply-btn:hover {
      background: #0056b3;
    }
    
    .reset-btn {
      background: #6c757d;
      color: white;
    }
    
    .reset-btn:hover {
      background: #545b62;
    }
    
    .status {
      text-align: center;
      margin-top: 12px;
      padding: 8px;
      border-radius: 4px;
      font-size: 12px;
    }
    
    .status.success {
      background: #d4edda;
      color: #155724;
    }
    
    .status.error {
      background: #f8d7da;
      color: #721c24;
    }
    
    .toggle {
      position: relative;
      display: inline-block;
      width: 50px;
      height: 24px;
    }
    
    .toggle input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    
    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #ccc;
      transition: .4s;
      border-radius: 24px;
    }
    
    .slider:before {
      position: absolute;
      content: "";
      height: 18px;
      width: 18px;
      left: 3px;
      bottom: 3px;
      background-color: white;
      transition: .4s;
      border-radius: 50%;
    }
    
    input:checked + .slider {
      background-color: #007bff;
    }
    
    input:checked + .slider:before {
      transform: translateX(26px);
    }
  </style>
</head>
<body>
  <div class="header">
    <h2>Mole Tweaker</h2>
    <p>Optimize Optimole image parameters</p>
  </div>
  
  <div class="toggle-container">
    <span>Enable for this page</span>
    <label class="toggle">
      <input type="checkbox" id="enableToggle">
      <span class="slider"></span>
    </label>
  </div>
  
  <div class="control-group">
    <label for="quality">Quality (q):</label>
    <select id="quality">
      <option value="">Keep original</option>
      <option value="mauto">Auto (mauto)</option>
      <option value="99">99</option>
      <option value="90">90</option>
      <option value="80">80</option>
      <option value="70">70</option>
      <option value="60">60</option>
      <option value="50">50</option>
    </select>
  </div>
  
  <div class="control-group">
    <label for="format">Format (f):</label>
    <select id="format">
      <option value="">Keep original</option>
      <option value="best">Best</option>
      <option value="remove">Remove parameter</option>
    </select>
  </div>
  
  <div class="control-group">
    <label for="imageFormat">Image Format (ig):</label>
    <select id="imageFormat">
      <option value="">Keep original</option>
      <option value="avif">Force AVIF (ig:avif)</option>
      <option value="remove">Remove (no format conversion)</option>
    </select>
  </div>
  
  <div class="control-group">
    <label for="dpr">Device Pixel Ratio (dpr):</label>
    <select id="dpr">
      <option value="">Keep original</option>
      <option value="1">1x</option>
      <option value="2">2x</option>
      <option value="3">3x</option>
      <option value="remove">Remove parameter</option>
    </select>
  </div>
  
  <div class="button-group">
    <button id="applyBtn" class="apply-btn">Apply Changes</button>
    <button id="resetBtn" class="reset-btn">Reset</button>
  </div>
  
  <div id="status" class="status" style="display: none;"></div>
  
  <script src="popup.js"></script>
</body>
</html>
